<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width = device-width , initial-scale=1.0">
  <title>Premium Currency Converter</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="theme-btn" type="button">🌙</button>

<div class="container">
  <h2>Currency Converter</h2>
  <form>
    <div class="amount">
      <p>Enter Amount</p>
      <input value="100" type="number" min="1">
    </div>

    <div class="dropdown">
      <div class="from">
        <p>From</p>
        <div class="select-container">
          <img src="https://flagsapi.com/US/flat/64.png" alt="flag">
          <select name="from"></select>
        </div>
      </div>
      <i class="fa-solid fa-arrow-right-arrow-left"></i>
      <div class="to">
        <p>To</p>
        <div class="select-container">
          <img src="https://flagsapi.com/IN/flat/64.png" alt="flag">
          <select name="to"></select>
        </div>
      </div>
    </div>

    <div class="msg">Loading rates...</div>
    <button type="button" id="get-rate-btn">Get Exchange Rate</button>
  </form>
</div>

<script src="script.js"></script>
</body>
</html>
